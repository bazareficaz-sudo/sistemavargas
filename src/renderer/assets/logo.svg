<svg viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a8f"/>
      <stop offset="50%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c4e8"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0099cc"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
  </defs>

  <!-- ── Icon mark (80×80, centered at 80,80) ── -->

  <!-- Network lines -->
  <g stroke="#1a5fa8" stroke-width="1.4" opacity="0.75" fill="none">
    <line x1="80" y1="8"  x2="140" y2="42"/>
    <line x1="140" y1="42" x2="140" y2="118"/>
    <line x1="140" y1="118" x2="80" y2="152"/>
    <line x1="80"  y1="152" x2="20" y2="118"/>
    <line x1="20"  y1="118" x2="20" y2="42"/>
    <line x1="20"  y1="42"  x2="80" y2="8"/>
    <!-- inner spokes -->
    <line x1="80" y1="8"   x2="55" y2="60"/>
    <line x1="140" y1="42"  x2="90" y2="60"/>
    <line x1="140" y1="118" x2="95" y2="100"/>
    <line x1="80"  y1="152" x2="75" y2="108"/>
    <line x1="20"  y1="118" x2="60" y2="98"/>
    <line x1="20"  y1="42"  x2="65" y2="58"/>
  </g>

  <!-- Hexagon dots (nodes) -->
  <g fill="#1a5fa8" opacity="0.85">
    <polygon points="80,3 85,6 85,12 80,15 75,12 75,6"  />
    <polygon points="140,37 145,40 145,46 140,49 135,46 135,40"/>
    <polygon points="140,113 145,116 145,122 140,125 135,122 135,116"/>
    <polygon points="80,147 85,150 85,156 80,159 75,156 75,150"/>
    <polygon points="20,113 25,116 25,122 20,125 15,122 15,116"/>
    <polygon points="20,37 25,40 25,46 20,49 15,46 15,40"/>
  </g>

  <!-- V shape — left arm -->
  <path d="M28 28 L50 28 L80 105 L110 28 L132 28 L80 128 Z" fill="url(#vGrad)"/>
  <!-- V inner cutout for depth -->
  <path d="M38 28 L58 28 L80 96 L102 28 L122 28 L80 110 Z" fill="#0d2e72" opacity="0.35"/>

  <!-- S curl (cyan) -->
  <path d="
    M 68 52
    C 52 52, 47 64, 55 72
    C 62 80, 76 76, 80 80
    C 84 84, 88 94, 76 98
    C 64 102, 58 94, 62 88
  " stroke="url(#sGrad)" stroke-width="9" stroke-linecap="round" fill="none"/>

  <!-- Arrow (up-right, cyan) -->
  <g fill="url(#arrowGrad)">
    <!-- shaft -->
    <rect x="98" y="30" width="8" height="38" rx="3" transform="rotate(45 102 49)"/>
    <!-- head -->
    <polygon points="118,18 136,14 130,32"/>
  </g>

  <!-- ── Text ── -->
  <text x="170" y="80" font-size="52" font-weight="900" letter-spacing="1" fill="#0d2e72">SISTEMA</text>
  <text x="170" y="136" font-size="52" font-weight="900" letter-spacing="1" fill="#0d2e72">VARGAS</text>
  <text x="172" y="153" font-size="13.5" font-weight="500" letter-spacing="2.5" fill="#1565c0">GESTÃO OMNICHANNEL PARA O VAREJO</text>
</svg>

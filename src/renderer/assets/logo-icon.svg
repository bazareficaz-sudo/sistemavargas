  </defs>

  <!-- Network lines -->
  <g stroke="#1a5fa8" stroke-width="2.2" opacity="0.7" fill="none">
    <line x1="80" y1="8"   x2="144" y2="44"/>
    <line x1="144" y1="44" x2="144" y2="116"/>
    <line x1="144" y1="116" x2="80" y2="152"/>
    <line x1="80"  y1="152" x2="16" y2="116"/>
    <line x1="16"  y1="116" x2="16" y2="44"/>
    <line x1="16"  y1="44"  x2="80" y2="8"/>
  </g>

  <!-- Hexagon nodes -->
  <g fill="#1565c0">
    <polygon points="80,2  86,6  86,14 80,18 74,14 74,6"/>
    <polygon points="144,38 150,42 150,50 144,54 138,50 138,42"/>
    <polygon points="144,110 150,114 150,122 144,126 138,122 138,114"/>
    <polygon points="80,142 86,146 86,154 80,158 74,154 74,146"/>
    <polygon points="16,110 22,114 22,122 16,126 10,122 10,114"/>
